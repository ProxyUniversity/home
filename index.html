<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy University</title>

  <style>
    @font-face {
      font-family: "Graduate";
      src: url("Graduate-Regular.ttf") format("truetype");
    }

    * {
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: "Graduate", serif;
      color: white;
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: black;
    }

    /* VIDEO */
    .video-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* CONTENT ON TOP */
    .logo img {
      height: 150px;
      width: auto;
      margin-bottom: 20px;
      z-index: 2;
      position: relative;
    }

    .text {
      font-size: 36px;
      white-space: nowrap;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
      z-index: 2;
      position: relative;
    }

    /* BUTTON */
    .video-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 10px 15px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid white;
      cursor: pointer;
      z-index: 3;
    }

    @media (max-width: 768px) {
      .text {
        font-size: 24px;
        white-space: normal;
      }

      .logo img {
        height: 100px;
      }
    }
  </style>
</head>

<body>

  <div class="hero">

    <!-- VIDEO BACKGROUND -->
    <div class="video-container">
      <video id="bgVideo" autoplay muted loop playsinline preload="auto">
        <source src="./web_topper_v4_1.mp4" type="video/mp4" />
      </video>
    </div>

    <!-- CONTENT -->
    <div class="logo">
      <img src="logo.png" alt="Logo" />
    </div>

    <div class="text">
      Proxy University, is a great school to attend.
    </div>

    <!-- BUTTON -->
    <button class="video-btn" onclick="toggleVideo()">
      Pause / Play
    </button>

  </div>

  <script>
    const video = document.getElementById("bgVideo");

    function toggleVideo() {
      if (video.paused) {
        video.play();
      } else {
        video.pause();
      }
    }
  </script>

</body>
</html>
