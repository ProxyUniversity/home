<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy University</title>

  <!-- FAVICON -->
  <link rel="icon" type="image/png" href="./Screen Shot 2026-05-18 at 7.27.32 PM.png">

  <style>
    @font-face {
      font-family: "Graduate";
      src: url("Graduate-Regular.ttf") format("truetype");
    }

    * {
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: "Graduate", serif;
      color: white;
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: black;
    }

    /* VIDEO */
    .video-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .video-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* DARK OVERLAY */
    .video-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      opacity: 0.35;
      z-index: 1;
    }

    /* CONTENT */
    .logo img {
      height: 250px;
      width: auto;
      margin-bottom: 20px;
      z-index: 2;
      position: relative;
    }

    .text {
      font-size: 36px;
      white-space: nowrap;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
      z-index: 2;
      position: relative;
    }

    /* VIDEO BUTTON */
    .video-btn {
      position: absolute;
      bottom: 20px;
      right: 20px;
      padding: 10px 15px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: 1px solid white;
      cursor: pointer;
      z-index: 3;
      font-family: "Graduate", serif;
    }

    /* ENROLL BUTTON */
    .enroll-btn {
      margin-top: 20px;
      padding: 10px 18px;
      background: #1e6bff;
      color: white;
      border: none;
      cursor: pointer;
      z-index: 3;
      font-size: 16px;
      border-radius: 4px;
      position: relative;
      font-family: "Graduate", serif;
    }

    /* PASSWORD IMAGE */
    #passwordImage {
      display: none;
      position: relative;
      z-index: 3;
      max-width: 80%;
      max-height: 80vh;
      margin-top: 20px;
    }

    /* PASSWORD POPUP */
    .password-popup {
      display: none;
      position: fixed;
      z-index: 10;
      background: rgba(0,0,0,0.95);
      border: 2px solid white;
      padding: 30px;
      border-radius: 10px;
      text-align: center;
    }

    .password-popup h1 {
      margin-top: 0;
      font-size: 32px;
    }

    .password-popup p {
      font-size: 14px;
      margin-top: 10px;
    }

    .password-popup input {
      padding: 10px;
      width: 250px;
      font-size: 16px;
      margin-top: 10px;
      font-family: "Graduate", serif;
    }

    .password-popup button {
      margin-top: 15px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
      font-family: "Graduate", serif;
    }

    @media (max-width: 768px) {
      .text {
        font-size: 24px;
        white-space: normal;
      }

      .logo img {
        height: 100px;
      }
    }
  </style>
</head>

<body>

  <div class="hero">

    <!-- VIDEO BACKGROUND -->
    <div class="video-container">
      <video id="bgVideo" autoplay muted loop playsinline preload="auto">
        <source src="./web_topper_v4_1.mp4" type="video/mp4" />
      </video>
    </div>

    <!-- OVERLAY -->
    <div class="video-overlay"></div>

    <!-- LOGO -->
    <div class="logo" id="logo">
      <img src="logov2.png" alt="Logo" />
    </div>

    <!-- TEXT -->
    <div class="text" id="mainText">
      Proxy University, is a great school to attend.
    </div>

    <!-- ENROLL BUTTON -->
    <button class="enroll-btn" id="enrollBtn" onclick="openPopup()">
      Enroll Now
    </button>

    <!-- PASSWORD IMAGE -->
    <img 
      id="passwordImage"
      src="PASSWORD IS “STUDENT123”.png"
      alt="Password"
    />

    <!-- PASSWORD POPUP -->
    <div class="password-popup" id="passwordPopup">
      <h1>Teacher Protected</h1>

      <input 
        type="password" 
        id="passwordInput" 
        placeholder="Enter Password"
      />

      <br>

      <button onclick="checkPassword()">
        Enter
      </button>

      <p>its a student zone NO TEACHERS bro</p>
    </div>

    <!-- VIDEO BUTTON -->
    <button class="video-btn" onclick="toggleVideo()">
      Pause / Play
    </button>

  </div>

  <script>
    const video = document.getElementById("bgVideo");

    function toggleVideo() {
      if (video.paused) {
        video.play();
      } else {
        video.pause();
      }
    }

    function openPopup() {
      document.getElementById("passwordPopup").style.display = "block";
    }

    function checkPassword() {
      const password = document.getElementById("passwordInput").value;

      if (
        password === "Student" ||
        password === "student" ||
        password === "STUDENT123"
      ) {
        document.getElementById("passwordPopup").style.display = "none";

        document.getElementById("logo").style.display = "none";
        document.getElementById("mainText").style.display = "none";
        document.getElementById("enrollBtn").style.display = "none";

        document.getElementById("passwordImage").style.display = "block";
      } else {
        alert("Wrong Password");
      }
    }
  </script>

</body>
</html>
