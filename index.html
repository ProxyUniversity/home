<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proxy University</title>

  <style>
    @font-face {
      font-family: "Graduate";
      src: url("Graduate-Regular.ttf") format("truetype");
    }

    * {
      box-sizing: border-box;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: "Graduate", serif;
      color: white;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh; /* full viewport height */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: black; /* fallback */
    }

    .hero video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* fills the screen */
      z-index: -1; /* behind content */
    }

    .logo img {
      height: 150px;
      width: auto;
      margin-bottom: 20px;
    }

    .text {
      font-size: 36px;
      white-space: nowrap;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.7); /* makes text readable over video */
    }

    @media (max-width: 768px) {
      .text {
        font-size: 24px;
        white-space: normal;
      }
      .logo img {
        height: 100px;
      }
    }
  </style>
</head>

<body>
  <div class="hero">
    <video autoplay muted loop>
      <source src="web_topper_v4_1.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>

    <div class="logo">
      <img src="logo.png" alt="Logo" />
    </div>

    <div class="text">
      Proxy University, is a great school to attend.
    </div>
  </div>
</body>
</html>
